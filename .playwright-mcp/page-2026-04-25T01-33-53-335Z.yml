        - heading "Deep scratches remain after coarse grit" [level=2] [ref=e27]
        - generic [ref=e28]:
          - generic [ref=e29]:
            - generic [ref=e30]: Likely cause
            - generic [ref=e31]: The starting grit was too coarse for the finish goal, or the next grit was not fine enough to remove the previous scratch pattern.
          - generic [ref=e32]:
            - generic [ref=e33]: Recommended grit
            - generic [ref=e34]: "Move one step finer at a time: 80 → 120 → 180 → 220 → 320. For finishing, continue to 400+ as needed."
          - generic [ref=e35]:
            - generic [ref=e36]: Wet or dry
            - generic [ref=e37]: Dry for early removal; wet for fine finishing when the surface and project allow it.
          - generic [ref=e38]:
            - generic [ref=e39]: Success check
            - generic [ref=e40]: The surface shows one even, finer scratch pattern with no remaining deep lines.
        - heading "What to do" [level=3] [ref=e41]
        - list [ref=e42]:
          - listitem [ref=e43]: Stop sanding aggressively in one spot.
          - listitem [ref=e44]: Sand evenly with the next finer grit until the old scratch pattern is lighter.
          - listitem [ref=e45]: Clean the surface before moving to the next grit.
          - listitem [ref=e46]: Repeat with finer grits until the scratches are no longer visible.
        - generic [ref=e47]:
          - strong [ref=e48]: "Avoid:"
          - text: Do not jump directly from a very coarse grit to a very fine grit.
