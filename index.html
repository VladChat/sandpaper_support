<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>eQualle Sandpaper Support</title>
<meta name="description" content="Find sandpaper problems by symptom and get exact sanding, grit, wet sanding, and troubleshooting help.">
<link rel="icon" href="/sandpaper_support/icons/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="/sandpaper_support/icons/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/sandpaper_support/icons/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/sandpaper_support/icons/apple-touch-icon.png">
<link rel="manifest" href="/sandpaper_support/icons/site.webmanifest">
<meta name="theme-color" content="#0B0C0E">

<link rel="stylesheet" href="/sandpaper_support/assets/styles.css?v=support-home-tools-20260426">
<style>
body.support-home .support-home-main {
  align-items: flex-start;
  padding: clamp(72px, 12vh, 96px) 24px 48px;
}

body.support-home .support-hero-content {
  max-width: 860px;
}

body.support-home .support-search-shell {
  max-width: 760px;
}

body.support-home .support-search-form {
  min-height: 64px;
  padding: 6px 8px 6px 22px;
  gap: 8px;
  box-shadow: 0 8px 28px rgba(11, 12, 14, 0.1);
}

body.support-home .support-search-input {
  min-height: 50px;
  padding: 0;
}

body.support-home .support-search-button,
body.support-home .support-tool-button {
  align-items: center;
  border: 0;
  cursor: pointer;
  display: inline-flex;
  justify-content: center;
  min-height: 44px;
  white-space: nowrap;
}

body.support-home .support-tool-button {
  background: transparent;
  border-radius: 999px;
  color: #4b5563;
  font: inherit;
  min-width: 44px;
  padding: 0 12px;
}

body.support-home .support-tool-button:hover {
  background: #f3f4f6;
  color: #0b0c0e;
}

body.support-home .support-tool-button svg {
  height: 20px;
  width: 20px;
}

body.support-home .support-photo-button {
  gap: 6px;
  font-size: 14px;
  font-weight: 600;
}

body.support-home .support-search-button {
  height: 50px;
  margin-right: 0;
  padding: 0 28px;
}

@media (max-width: 860px) {
  body.support-home .support-home-main {
    padding: 64px 20px 40px;
  }

  body.support-home .support-search-shell {
    max-width: 100%;
  }
}

@media (max-width: 600px) {
  body.support-home .support-home-main {
    padding: 52px 16px 32px;
  }

  body.support-home .support-search-form {
    border-radius: 28px;
    flex-wrap: wrap;
    padding: 10px;
  }

  body.support-home .support-search-input {
    flex-basis: 100%;
    min-height: 44px;
    padding: 0 8px;
  }

  body.support-home .support-tool-button {
    min-height: 44px;
    min-width: 44px;
  }

  body.support-home .support-photo-button {
    flex: 1;
  }

  body.support-home .support-search-button {
    flex: 1.4;
    height: 44px;
    margin-right: 0;
    padding: 0 16px;
  }
}
</style>
</head>
<body class="support-home">
<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="/sandpaper_support/">eQualle <span>Support</span></a>
    <nav class="nav"><a href="/sandpaper_support/problems/">Problems</a><a href="/sandpaper_support/surfaces/">Surfaces</a><a href="/sandpaper_support/grits/">Grit Guide</a><a href="/sandpaper_support/products/">Products</a><a href="/sandpaper_support/tools/">Tools</a></nav>
  </div>
</header>
<main class="support-home-main">
  <section class="support-hero">
    <div class="support-hero-content">
      <h1 class="support-hero-title">Sandpaper Help Center</h1>
      <p class="support-hero-subtitle">Describe the problem.</p>
      <div class="support-search-shell">
        <div class="support-search-form" role="search">
          <input
            id="support-search"
            class="support-search-input"
            data-support-search
            placeholder="Example: sandpaper clogs too fast"
          >
          <button class="support-tool-button support-mic-button" type="button" aria-label="Voice input coming soon" title="Voice input coming soon">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3Zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.49 6-3.31 6-6.72h-1.7Z"/>
            </svg>
          </button>
          <button class="support-tool-button support-photo-button" type="button" aria-label="Add photo coming soon" title="Add photo coming soon">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M19 5h-3.17l-1.84-2H10L8.17 5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2Zm-7 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5Zm0-1.8A3.2 3.2 0 1 0 12 9.8a3.2 3.2 0 0 0 0 6.4Z"/>
            </svg>
            <span>Add Photo</span>
          </button>
          <button class="support-search-button" type="button" data-support-search-submit>Get Answer</button>
        </div>
        <div class="search-results" data-search-results></div>
      </div>
    </div>
  </section>
</main>

<footer class="support-footer">
  <div class="support-footer-inner">&copy; 2026 eQualle Sandpaper Support</div>
</footer>

<script src="/sandpaper_support/assets/config.js"></script>
<script src="/sandpaper_support/assets/supabase-client.js?v=feedback-minimal-20260426"></script>
<script src="/sandpaper_support/assets/app.js?v=homepage-tools-20260426"></script>
<script>
(function () {
  document.querySelectorAll(".support-tool-button").forEach(function (button) {
    button.addEventListener("click", function () {
      var input = document.querySelector("[data-support-search]");
      if (input) {
        input.focus();
      }
    });
  });
})();
</script>
</body>
</html>
