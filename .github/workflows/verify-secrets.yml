name: Verify Repository Secrets

on:
  workflow_dispatch:

jobs:
  verify-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Check required secret names are present
        shell: bash
        run: |
          set -euo pipefail
          required=(
            OPENAI_API_KEY
            SUPABASE_URL
            SUPABASE_ANON_KEY
            SUPABASE_PROJECT_REF
            SUPABASE_DB_URL
            SUPABASE_SERVICE_ROLE_KEY
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "❌ Missing secret: $name"
              exit 1
            fi
            echo "✅ Present: $name"
          done

      - name: Validate Supabase URL and project ref
        shell: bash
        run: |
          set -euo pipefail
          expected="https://${SUPABASE_PROJECT_REF}.supabase.co"
          if [ "$SUPABASE_URL" != "$expected" ]; then
            echo "❌ SUPABASE_URL does not match SUPABASE_PROJECT_REF"
            echo "Expected URL pattern: https://<SUPABASE_PROJECT_REF>.supabase.co"
            exit 1
          fi
          echo "✅ Supabase URL matches project ref"

      - name: Validate Supabase service role JWT project ref
        shell: python
        run: |
          import base64, json, os, sys
          token = os.environ["SUPABASE_SERVICE_ROLE_KEY"]
          project_ref = os.environ["SUPABASE_PROJECT_REF"]
          try:
              parts = token.split(".")
              if len(parts) != 3:
                  raise ValueError("token is not a legacy JWT service_role key")
              payload = parts[1] + "=" * (-len(parts[1]) % 4)
              data = json.loads(base64.urlsafe_b64decode(payload).decode("utf-8"))
              if data.get("role") != "service_role":
                  raise ValueError("JWT role is not service_role")
              if data.get("ref") != project_ref:
                  raise ValueError("JWT project ref does not match SUPABASE_PROJECT_REF")
              print("✅ Service role JWT matches project ref and role")
          except Exception as exc:
              print("❌ SUPABASE_SERVICE_ROLE_KEY validation failed:", str(exc))
              sys.exit(1)

      - name: Test Supabase publishable key auth access
        shell: bash
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/auth/v1/settings" || true)
          if [ "$code" = "200" ]; then
            echo "✅ Supabase publishable/anon auth check passed"
          else
            echo "❌ Supabase publishable/anon auth check failed with HTTP $code"
            exit 1
          fi

      - name: Test Supabase service role REST access
        shell: bash
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            "${SUPABASE_URL}/rest/v1/" || true)
          if [[ "$code" =~ ^(200|204|300|301|302|307|308)$ ]]; then
            echo "✅ Supabase service role REST check passed"
          else
            echo "❌ Supabase service role REST check failed with HTTP $code"
            exit 1
          fi

      - name: Test Supabase database connection
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --quiet "psycopg[binary]"
          python - <<'PY'
          import os, sys
          import psycopg
          try:
              with psycopg.connect(os.environ["SUPABASE_DB_URL"], connect_timeout=15) as conn:
                  with conn.cursor() as cur:
                      cur.execute("select current_database(), current_user")
                      cur.fetchone()
              print("✅ Supabase DB URL connection passed")
          except Exception as exc:
              print("❌ SUPABASE_DB_URL connection failed:", type(exc).__name__)
              print("Hint: special characters in the password must be URL-encoded, for example @ becomes %40.")
              sys.exit(1)
          PY

      - name: Test OpenAI API key
        shell: bash
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${OPENAI_API_KEY}" \
            "https://api.openai.com/v1/models" || true)
          if [[ "$code" =~ ^2 ]]; then
            echo "✅ OpenAI API key check passed"
          else
            echo "❌ OpenAI API key check failed with HTTP $code"
            exit 1
          fi
