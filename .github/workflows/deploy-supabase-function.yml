name: Deploy Supabase Function

on:
  workflow_dispatch:

jobs:
  deploy-support-ai-chat:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets exist
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing secret: SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing secret: SUPABASE_ANON_KEY"
            exit 1
          fi

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "Missing secret: OPENAI_API_KEY"
            exit 1
          fi

          echo "Required secrets are present."

      - name: Sync OPENAI_API_KEY to Supabase project secrets
        shell: bash
        run: |
          set -euo pipefail

          supabase secrets set OPENAI_API_KEY="$OPENAI_API_KEY" --project-ref "$SUPABASE_PROJECT_REF"

          echo "OPENAI_API_KEY synced to Supabase secrets."

      - name: Deploy support-ai-chat function
        shell: bash
        run: |
          set -euo pipefail

          supabase functions deploy support-ai-chat --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

          echo "Function deploy completed."

      - name: Test support-ai-chat POST
        shell: bash
        run: |
          set -euo pipefail

          endpoint="https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/support-ai-chat"

          payload='{
            "sessionToken": "gha-test-session",
            "userMessage": "3000 grit does not make gloss",
            "context": {
              "currentPath": "/",
              "retrievedContent": {
                "solutionCards": [
                  {
                    "title": "3000 grit does not create gloss by itself",
                    "problem": "The surface is still hazy after 3000 grit.",
                    "recommended_grit": "Use 3000 as the final sanding step before polishing when gloss is required.",
                    "wet_or_dry": "Wet",
                    "avoid": "Do not expect sanding alone to restore gloss.",
                    "target_url": "/solutions/3000-does-not-create-gloss/"
                  }
                ]
              }
            }
          }'

          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "$endpoint" \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --data "$payload")

          echo "Function POST status: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "Function POST failed."
            cat response.json
            exit 1
          fi

          python - <<'PY'
          import json

          with open("response.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          reply = data.get("reply", "")

          if not isinstance(reply, str) or not reply.strip():
              raise SystemExit("Function response missing reply")

          print("Function response looks valid.")
          PY